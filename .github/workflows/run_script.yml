name: Ejecutar Script Diario

on:
  schedule:
    - cron: '0 6 * * *'  # 1:00 AM Colombia
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Crear credenciales.json
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credenciales.json

      - name: Ejecutar script
        run: python main.py